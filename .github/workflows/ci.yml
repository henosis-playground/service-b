name: ci

on:
  push:

permissions:
  contents: read

jobs:
  henosis-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Typecheck Henosis component
        run: |
          corepack enable
          corepack pnpm@11.3.0 --dir henosis install --frozen-lockfile
          corepack pnpm@11.3.0 --dir henosis exec tsc --noEmit --pretty false

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fake image build
        shell: bash
        run: |
          DIGEST="sha256:$(git archive HEAD | sha256sum | cut -d' ' -f1)"
          printf '%s\n' "$DIGEST" > digest.txt
          {
            echo "### Image digest"
            echo
            echo "\`$DIGEST\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: image-digest
          path: digest.txt
          if-no-files-found: error
